<svg width="1200" height="628" viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="1200" height="628" fill="#0d1117"/>

  <!-- Subtle dot grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1f2937" opacity="0.8"/>
    </pattern>
    <linearGradient id="leftGlow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightGlow" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="628" fill="url(#grid)"/>

  <!-- Left ambient glow -->
  <rect x="0" y="0" width="560" height="628" fill="url(#leftGlow)"/>
  <!-- Right ambient glow -->
  <rect x="640" y="0" width="560" height="628" fill="url(#rightGlow)"/>

  <!-- ─── LEFT SIDE: HUNTER / CONSULTANT ─────────────────── -->

  <!-- Crosshair outer ring -->
  <circle cx="300" cy="280" r="110" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.5"/>
  <!-- Crosshair middle ring -->
  <circle cx="300" cy="280" r="72" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.4"/>
  <!-- Crosshair inner ring -->
  <circle cx="300" cy="280" r="36" fill="none" stroke="#ff4444" stroke-width="2" opacity="0.9" filter="url(#glow-red)"/>
  <!-- Crosshair centre dot -->
  <circle cx="300" cy="280" r="5" fill="#ff4444" opacity="1" filter="url(#glow-red)"/>

  <!-- Crosshair lines -->
  <line x1="160" y1="280" x2="256" y2="280" stroke="#ff4444" stroke-width="1.5" opacity="0.8"/>
  <line x1="344" y1="280" x2="440" y2="280" stroke="#ff4444" stroke-width="1.5" opacity="0.8"/>
  <line x1="300" y1="140" x2="300" y2="236" stroke="#ff4444" stroke-width="1.5" opacity="0.8"/>
  <line x1="300" y1="324" x2="300" y2="420" stroke="#ff4444" stroke-width="1.5" opacity="0.8"/>

  <!-- Crosshair tick marks on outer ring -->
  <line x1="300" y1="162" x2="300" y2="174" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
  <line x1="300" y1="386" x2="300" y2="398" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
  <line x1="178" y1="280" x2="190" y2="280" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
  <line x1="410" y1="280" x2="422" y2="280" stroke="#ff4444" stroke-width="1" opacity="0.6"/>

  <!-- Rotating degree markers -->
  <text x="300" y="154" fill="#ff4444" font-size="9" text-anchor="middle" opacity="0.5">000°</text>
  <text x="432" y="284" fill="#ff4444" font-size="9" text-anchor="start" opacity="0.5">090°</text>
  <text x="300" y="412" fill="#ff4444" font-size="9" text-anchor="middle" opacity="0.5">180°</text>
  <text x="160" y="284" fill="#ff4444" font-size="9" text-anchor="end" opacity="0.5">270°</text>

  <!-- "CONSULTANT" label -->
  <text x="300" y="460" fill="#ff4444" font-size="13" text-anchor="middle" letter-spacing="6" opacity="0.9" font-weight="bold">CONSULTANT</text>

  <!-- Small terminal snippet bottom-left -->
  <text x="48" y="530" fill="#ff4444" font-size="10" opacity="0.35">$ sqlmap -u "https://target/login"</text>
  <text x="48" y="546" fill="#ff4444" font-size="10" opacity="0.25">[INFO] testing for SQL injection...</text>
  <text x="48" y="562" fill="#ff4444" font-size="10" opacity="0.35">[CRITICAL] parameter 'id' is injectable</text>

  <!-- ─── CENTRE DIVIDER + ARROW ─────────────────────────── -->

  <!-- Vertical divider line -->
  <line x1="600" y1="0" x2="600" y2="628" stroke="url(#dividerGrad)" stroke-width="1"/>

  <!-- Transform arrow group -->
  <g transform="translate(600, 280)">
    <!-- Arrow shaft -->
    <line x1="-52" y1="0" x2="38" y2="0" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <!-- Arrow head -->
    <polygon points="52,0 32,-10 36,0 32,10" fill="#ffffff" opacity="0.6"/>
    <!-- Small label -->
    <text x="0" y="-18" fill="#ffffff" font-size="9" text-anchor="middle" letter-spacing="3" opacity="0.4">TRANSITION</text>
  </g>

  <!-- ─── RIGHT SIDE: GUARDIAN / ENGINEER ────────────────── -->

  <!-- Shield shape -->
  <path d="M900,160 L980,195 L980,295 Q980,370 900,410 Q820,370 820,295 L820,195 Z"
        fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.9" filter="url(#glow-blue)"/>
  <!-- Shield inner -->
  <path d="M900,178 L966,208 L966,296 Q966,358 900,392 Q834,358 834,296 L834,208 Z"
        fill="#00d4ff" fill-opacity="0.05" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- Shield inner icon: lock -->
  <rect x="882" y="268" width="36" height="30" rx="3" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>
  <path d="M889,268 L889,256 Q889,240 900,240 Q911,240 911,256 L911,268" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>
  <circle cx="900" cy="282" r="4" fill="#00d4ff" opacity="0.9"/>
  <line x1="900" y1="286" x2="900" y2="292" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>

  <!-- Shield corner accents -->
  <line x1="820" y1="195" x2="836" y2="195" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="820" y1="195" x2="820" y2="211" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="980" y1="195" x2="964" y2="195" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="980" y1="195" x2="980" y2="211" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>

  <!-- "ENGINEER" label -->
  <text x="900" y="460" fill="#00d4ff" font-size="13" text-anchor="middle" letter-spacing="6" opacity="0.9" font-weight="bold">ENGINEER</text>

  <!-- Small code snippet bottom-right -->
  <text x="660" y="530" fill="#00d4ff" font-size="10" opacity="0.35">def review_pr(pr_id, team):</text>
  <text x="660" y="546" fill="#00d4ff" font-size="10" opacity="0.25">    findings = scan(pr_id)</text>
  <text x="660" y="562" fill="#00d4ff" font-size="10" opacity="0.35">    return unblock(team, findings)</text>

  <!-- ─── TITLE BAND ──────────────────────────────────────── -->

  <rect x="0" y="0" width="1200" height="72" fill="#0d1117" fill-opacity="0.85"/>
  <line x1="0" y1="72" x2="1200" y2="72" stroke="#1f2937" stroke-width="1"/>

  <text x="600" y="26" fill="#ffffff" font-size="11" text-anchor="middle" letter-spacing="5" opacity="0.5">ROHITSALECHA.COM</text>
  <text x="600" y="58" fill="#ffffff" font-size="22" text-anchor="middle" letter-spacing="2" font-weight="bold" opacity="0.95">FROM HUNTER TO GUARDIAN</text>

  <!-- ─── BOTTOM TAG LINE ────────────────────────────────── -->

  <rect x="0" y="590" width="1200" height="38" fill="#0d1117" fill-opacity="0.85"/>
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#1f2937" stroke-width="1"/>
  <text x="600" y="612" fill="#6b7280" font-size="11" text-anchor="middle" letter-spacing="3">SECURITY CONSULTING  →  PRODUCT SECURITY ENGINEERING</text>

</svg>
